name: argox_ix4
description: >-
  Windows USB driver for ARGOX iX4-series PPLB label printers via the inbox
  usbprint.sys device interface — no vendor driver or print queue needed.
version: 0.1.3
repository: https://github.com/LarryHsiao/argox_ix4

environment:
  sdk: ^3.3.0

dependencies:
  pplb: ^0.1.0
  ffi: ^2.1.0
  # On Dart 3.3 (Windows 7), pub auto-selects win32 5.5.0 — the newest 5.x whose
  # SDK floor is ^3.3.0; 5.5.1+ require Dart 3.4. Newer Dart gets newer 5.x.
  win32: ^5.5.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.25.0
